services:
  - type: web
    name: diabetes-ai-streamlit
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: DATA_PATH
        value: data/diabetes.csv
      - key: MODEL_PATH
        value: models/best_model.joblib
      - key: TARGET_COL
        value: Outcome
      - key: USERS_CSV_PATH
        value: data/users.csv
